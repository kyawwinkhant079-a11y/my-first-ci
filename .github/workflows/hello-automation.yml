name: My First Automation
on: [push] # code ကို push လုပ်တိုင်း အလုပ်လုပ်ပါ

jobs:
  say-hello:
    runs-on: ubuntu-latest # GitHub ကပေးတဲ့ Linux စက်ပေါ်မှာ လုပ်မယ်
    steps:
      - name: Check out code
        uses: actions/checkout@v4 # ကိုယ့် code တွေကို runner စက်ထဲ ဆွဲယူတာ

      - name: Show message
        run: echo "Hello Win Khant! Your first pipeline is running."

      - name: Check Linux Version
        run: lsb_release -a