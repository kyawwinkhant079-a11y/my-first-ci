name: Lab 2 - Modified Thinking
on: 
  push:
    branches: [main, dev]

jobs:
  BranchTest:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
      
      - name: 2. All Of Info
        run: |
          echo "Lab 2 Successfully Completed"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "This step runs only on pushes to main"
          fi
          
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "This step runs only on pushes to dev"
            echo "Current Time: $(date)"
          fi
          
      - name: 3. Show Current User
        run: whoami